<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="2400" viewBox="0 0 2400 2400">
  <defs>
    <style>
      .brand{font-family:"Aptos Display","Century Gothic","Bahnschrift","Segoe UI",sans-serif;font-weight:730;letter-spacing:0}
      .stroke{fill:none;stroke-linecap:round;stroke-linejoin:round}
    </style>
    <linearGradient id="white" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".5" stop-color="#e9e8e2"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="base" x1="0" x2="1" y1="1" y2="0">
      <stop offset="0" stop-color="#31322f"/>
      <stop offset=".46" stop-color="#555550"/>
      <stop offset="1" stop-color="#74736c"/>
    </linearGradient>
    <radialGradient id="vignette" cx=".5" cy=".38" r=".85">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".07"/>
      <stop offset=".54" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity=".32"/>
    </radialGradient>
    <pattern id="lowGrain" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M0 0h5v5H0zM5 5h5v5H5z" fill="#fff" opacity=".016"/>
      <path d="M5 0h5v5H5zM0 5h5v5H0z" fill="#000" opacity=".075"/>
    </pattern>
    <pattern id="dust" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r=".14" fill="#fff" opacity=".045"/>
      <circle cx="12" cy="7" r=".16" fill="#fff" opacity=".035"/>
      <circle cx="8" cy="15" r=".15" fill="#000" opacity=".07"/>
    </pattern>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.28" numOctaves="2" seed="80" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.58 0 0 0 0 0.58 0 0 0 0 0.55 0 0 0 .14 0"/>
      <feBlend mode="soft-light" in2="SourceGraphic"/>
    </filter>
    <filter id="lift" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000" flood-opacity=".3"/>
    </filter>
    <filter id="softText" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity=".22"/>
    </filter>
    <g id="logoMark">
      <g transform="translate(3 -32) scale(.76)">
        <g transform="translate(0 0) scale(.92) rotate(-90) translate(-145 -126)" filter="url(#lift)">
          <path d="M118 0C53 0 0 53 0 118s53 118 118 118" class="stroke" stroke="url(#white)" stroke-width="24"/>
          <g transform="translate(0 22) translate(204 126) scale(.66 1) translate(-204 -126)">
            <path d="M184 164l62 58" class="stroke" stroke="url(#white)" stroke-width="24"/>
            <path d="M118 30h78c58 0 94 29 94 67s-36 67-94 67h-78" class="stroke" stroke="url(#white)" stroke-width="24"/>
          </g>
        </g>
      </g>
      <circle cx="44.95" cy="-33.57" r="4.1" fill="#555550" stroke="url(#white)" stroke-width="4.6" filter="url(#lift)"/>
      <g transform="translate(0 -13.1) scale(.42) translate(-4 9)" filter="url(#lift)">
        <path d="M-14 -24C-10 -17 -4 -11 -4 -3C-4 4 -8 9 -14 9C-20 9 -24 4 -24 -3C-24 -11 -18 -17 -14 -24Z" fill="url(#white)"/>
        <path d="M4 -29C9 -20 16 -13 16 -3C16 5 11 11 4 11C-3 11 -8 5 -8 -3C-8 -13 -1 -20 4 -29Z" fill="url(#white)"/>
        <path d="M22 -24C26 -17 32 -11 32 -3C32 4 28 9 22 9C16 9 12 4 12 -3C12 -11 18 -17 22 -24Z" fill="url(#white)"/>
      </g>
    </g>
    <g id="brandLockup">
      <use href="#logoMark"/>
      <text x="0" y="216" text-anchor="middle" class="brand" font-size="58" fill="#f8f7f2" filter="url(#softText)">ControlRookie</text>
    </g>
  </defs>
  <rect width="2400" height="2400" fill="url(#base)"/>
  <rect width="2400" height="2400" fill="url(#vignette)"/>
  <rect width="2400" height="2400" fill="url(#lowGrain)" opacity=".9"/>
  <rect width="2400" height="2400" fill="url(#dust)" filter="url(#grain)"/>
  <g transform="translate(1200 1089.5) scale(2.25)">
    <use href="#brandLockup"/>
  </g>
</svg>
